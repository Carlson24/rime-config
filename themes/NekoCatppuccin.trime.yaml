  # T9 拼音键盘
  wanxiang_t9:
    __include: key_style/global_offset
    lock: false
    ascii_mode: 0
    reset_ascii_mode: true
    t9_mode: true # 启用 T9 模式（Boolean）
    t9_sidebar_width: 0.15 # T9 侧栏宽度（Float）
    t9_sidebar_position: left # T9 侧栏位置：left 或 right（String）
    t9_sidebar_span_rows: 3 # T9 侧栏跨越行数（Int）
    t9_sidebar_show_items: 4 # T9 侧栏显示候选项数（Int）
    t9_sidebar_symbols: ["，", "。", "？", "！", "、", "：", "；"] # T9 侧栏符号（List<String>）
    rows:
      - keys:
          - { width: 0.15, spacer: true }
          - { click: "1", label: "分词", hint: "1" }
          - { click: "2", label: "ABC", popup: ["a", "b", "c"], hint: "2" }
          - { click: "3", label: "DEF", popup: ["d", "e", "f"], hint: "3" }
          - { width: 0.15, click: "BackSpace", label: "ic@backspace_outline", key_text_size: 20, key_text_offset_y: 1, __include: "key_style/功能" }
      - keys:
          - { width: 0.15, spacer: true }
          - { click: "4", label: "GHI", popup: ["g", "h", "i"], hint: "4" }
          - { click: "5", label: "JKL", popup: ["j", "k", "l"], hint: "5" }
          - { click: "6", label: "MNO", popup: ["m", "n", "o"], hint: "6" }
          - { width: 0.15, click: "T9_clear", __include: "key_style/功能" }
      - keys:
          - { width: 0.15, spacer: true }
          - { click: "7", label: "PQRS", popup: ["p", "q", "r", "s"], hint: "7" }
          - { click: "8", label: "TUV", popup: ["t", "u", "v"], hint: "8" }
          - { click: "9", label: "WXYZ", popup: ["w", "x", "y", "z"], hint: "9" }
          - { width: 0.15, click: "liquid_keyboard_emoji", __include: "key_style/功能" }
      - keys:
          - { width: 0.15, click: "Keyboard_number", label_symbol: "ic@calculator_variant_outline", popup: ["wxcalc", "Refresh", "Deploy"], has_menu: Tab, __include: "key_style/功能" }
          - { width: 0.13, click: ",", label: "，", label_symbol: "[", swipe_up: "[", hint: "ic@web", swipe_down: IME_switch, __include: "key_style/功能" }
          - { click: "Space", label: "天文馆的猫", long_click: "VOICE_ASSIST", hint: "◕‿◕", swipe_down: "liquid_keyboard_switch", key_text_offset_y: 1 }
          - { width: 0.13, click: "Mode_switch", label_symbol: "]", swipe_up: "]", popup: ["Keyboard_wanxiang_zrm", "Keyboard_wanxiang_yoemin", "Keyboard_wanxiang_english", "Keyboard_wanxiang_18key", "Keyboard_wanxiang_t9"], hint: "ic@palette_swatch_outline", swipe_down: Theme_settings, has_menu: "has_menu_semicolon", key_text_size: 20, __include: "key_style/功能" }
          - { width: 0.15, click: "Return", label: "enter_labels", __include: "key_style/回车" }

  # 18 键双拼键盘（两字母合一键）
  wanxiang_18key:
    __include: key_style/global_offset
    lock: false
    ascii_mode: 0
    reset_ascii_mode: true
    label_transform: uppercase # 中文时字母大写显示（LabelTransform：UPPERCASE | NONE）
    rows:
      - height: 0.13
        keys:
          - { click: "1", long_click: "!", __include: "key_style/数字" }
          - { click: "2", long_click: "@", __include: "key_style/数字" }
          - { click: "3", long_click: "#", __include: "key_style/数字" }
          - { click: "4", long_click: "$", __include: "key_style/数字" }
          - { click: "5", long_click: "%", __include: "key_style/数字" }
          - { click: "6", long_click: "^", __include: "key_style/数字" }
          - { click: "7", long_click: "&", __include: "key_style/数字" }
          - { click: "8", long_click: "*", __include: "key_style/数字" }
          - { click: "9", long_click: "(", __include: "key_style/数字" }
          - { click: "0", long_click: ")", __include: "key_style/数字" }
      - keys:
          - { click: "q", label: " Q ", label_symbol: "`", swipe_up: "`", popup: ["Q"] }
          - { click: "w", label: "W E", label_symbol: "~", swipe_up: "~", popup: ["W", "E"] }
          - { click: "r", label: "R T", label_symbol: "+", swipe_up: "+", popup: ["R", "T"] }
          - { click: "y", label: " Y ", label_symbol: "-", swipe_up: "-", popup: ["Y"], hint: "ic@cursor_move", swipe_down: "Keyboard_edit" }
          - { click: "u", label: " U ", label_symbol: "=", swipe_up: "=", popup: ["U"] }
          - { click: "i", label: "I O", label_symbol: "ic@delete_forever", swipe_up: "{", popup: ["I", "O", "DeleteCandidate"] }
          - { click: "p", label: " P ", label_symbol: "ic@pin", swipe_up: "}", popup: ["P", "candtop"] }
      - keys:
          - { width: 0.05, spacer: true }
          - { click: "a", label: " A ", label_symbol: "_", swipe_up: "_", popup: ["A", "select_all"] }
          - { click: "s", label: "S D", label_symbol: ":", swipe_up: ":", popup: ["S", "D"] }
          - { click: "f", label: "F G", label_symbol: "\\", swipe_up: "\\", popup: ["F", "G"] }
          - { click: "h", label: " H ", label_symbol: "ic@pan_left", popup: ["H", "candleft"] }
          - { click: "j", label: "J K", label_symbol: "ic@pan_right", popup: ["J", "K", "candright"] }
          - { click: "l", label: " L ", label_symbol: "ic@lock_reset", popup: ["L", "candreset"] }
          - { width: 0.05, spacer: true }
      - keys:
          - { width: 0.15, click: "Shift_L", long_click: "Mode_switch", double_click: "Shift_L3", key_text_size: 20, key_text_offset_y: 1, __include: "key_style/功能" }
          - { click: "z", label: " Z ", label_symbol: "/", swipe_up: "/", popup: ["Z", "X"] }
          - { click: "x", label: "X C", label_symbol: "ic@content_copy", popup: ["X", "C", "copy"] }
          - { click: "v", label: " V ", label_symbol: "ic@content_paste", popup: ["V", "paste_clip"], swipe_down: "Clipboard_window", hint: "ic@clipboard_list_outline" }
          - { click: "b", label: "B N", label_symbol: "<", swipe_up: "<", popup: ["B", "N"] }
          - { click: "m", label: " M ", label_symbol: ">", swipe_up: ">", popup: ["M"] }
          - { width: 0.15, click: "BackSpace", label: "ic@backspace_outline", key_text_size: 20, key_text_offset_y: 1, __include: "key_style/功能" }
      - keys:
          - { width: 0.15, click: "Keyboard_number", label_symbol: "ic@calculator_variant_outline", popup: ["wxcalc", "Refresh", "Deploy"], has_menu: Tab, __include: "key_style/功能" }
          - { click: "'", label_symbol: '"', swipe_up: '"', hint: "ic@lightbulb_outline", swipe_down: "{Hint_switch}", __include: "key_style/功能" }
          - { click: ",", label: "，", label_symbol: "[", swipe_up: "[", hint: "ic@web", swipe_down: IME_switch, __include: "key_style/功能" }
          - { width: 0.3, click: "Space", label: "天文馆的猫", long_click: "VOICE_ASSIST", hint: "◕‿◕", swipe_down: "liquid_keyboard_switch", key_text_offset_y: 1 }
          - { click: ".", label: "。", label_symbol: "]", swipe_up: "]", hint: "ic@list_box_outline", swipe_down: Menu, __include: "key_style/功能" }
          - { click: "Mode_switch", label_symbol: "ic@keyboard_settings_outline", popup: ["Keyboard_wanxiang_zrm", "Keyboard_wanxiang_yoemin", "Keyboard_wanxiang_english", "Keyboard_wanxiang_18key", "Keyboard_wanxiang_t9"], hint: "ic@palette_swatch_outline", swipe_down: Theme_settings, has_menu: "has_menu_semicolon", key_text_size: 20, __include: "key_style/功能" }
          - { width: 0.15, click: "Return", label: "enter_labels", __include: "key_style/回车" }

# ── 液态键盘 ──
# 参数不支持变量或 fallback 机制，缺少参数时自动从 style 中加载
liquid_keyboard:
  author: "tumuyan"
  row: 6 # 竖屏每屏最多显示行数（Int）
  row_land: 5 # 横屏每屏最多显示行数（Int）
  key_height: 40 # 竖屏按键高度（Int）
  key_height_land: 50 # 横屏按键高度（Int）
  single_width: 50 # SINGLE 类型按键宽度（Int）
  vertical_gap: 4 # 纵向按键间隙（Int）
  margin_x: 2 # 左右按键间隙（Float）
  fixed_key_bar: # 固定按键条
    position: right # 摆放位置（Position：TOP | LEFT | BOTTOM | RIGHT | NAVBAR）
    keys: # 固定按键列表
      - liquid_keyboard_exit
      - { click: "BackSpace", label: "删除" }
      - { click: "Space", label: "空格" }
      - Clipboard_window
      - liquid_keyboard_switch
      - { click: "Return", label: "回车" }
  keyboards: [history, tabs, emoji, ascii, cn, pinyin, math, grease, list, ids, symbol, script_symbols, jp, rusa, korea, lation, yinbiao, unit, yanwenzi, combing] # Tab 分类列表
  tabs: # Tab 导航页
    name: 更多
    type: TABS # 类型：TABS
  history: # 历史记录页
    name: 常用
    type: HISTORY # 类型：HISTORY
  emoji: # 表情页
