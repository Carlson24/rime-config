  wanxiang_t9: # T9 布局
    __include: global_offset
    lock: false
    ascii_mode: 0
    t9_mode: true # 开启T9模式
    t9_sidebar_width: 0.15 # 侧边栏宽度
    t9_sidebar_position: left # 侧边栏位置（left或right）
    t9_sidebar_span_rows: 3 # 侧边栏跨行数
    t9_sidebar_show_items: 4 # 侧边栏显示的候选项数
    t9_sidebar_symbols: ["，", "。", "？", "！", "、", "：", "；"] # 侧边栏符号列表
    rows:
      - keys:
          - { width: 0.15, spacer: true }
          - { click: "1", label: "分词", hint: "1" }
          - { click: "2", label: "ABC", popup: ["a", "b", "c"], hint: "2" }
          - { click: "3", label: "DEF", popup: ["d", "e", "f"], hint: "3" }
          - { width: 0.15, click: "BackSpace", label: "ic@backspace_outline", key_text_size: 20, key_text_offset_y: 1, __include: "key_style/功能" }
      - keys:
          - { width: 0.15, spacer: true }
          - { click: "4", label: "GHI", popup: ["g", "h", "i"], hint: "4" }
          - { click: "5", label: "JKL", popup: ["j", "k", "l"], hint: "5" }
          - { click: "6", label: "MNO", popup: ["m", "n", "o"], hint: "6" }
          - { width: 0.15, click: "T9_clear", __include: "key_style/功能" }
      - keys:
          - { width: 0.15, spacer: true }
          - { click: "7", label: "PQRS", popup: ["p", "q", "r", "s"], hint: "7" }
          - { click: "8", label: "TUV", popup: ["t", "u", "v"], hint: "8" }
          - { click: "9", label: "WXYZ", popup: ["w", "x", "y", "z"], hint: "9" }
          - { width: 0.15, click: "liquid_keyboard_emoji", __include: "key_style/功能" }
      - keys:
          - { width: 0.15, click: "Keyboard_number", label_symbol: "ic@calculator_variant_outline", popup: ["wxcalc", "Refresh", "Deploy"], has_menu: Tab, __include: "key_style/功能" }
          - { width: 0.13, click: ",", label: "，", label_symbol: "[", swipe_up: "[", hint: "ic@web", swipe_down: IME_switch, __include: "key_style/功能" }
          - { click: "Space", long_click: "VOICE_ASSIST", hint: "◕‿◕", swipe_down: "liquid_keyboard_switch", key_text_offset_y: 1 }
          - { width: 0.13, click: "Mode_switch", label_symbol: "]", swipe_up: "]", popup: ["Keyboard_wanxiang_zrm", "Keyboard_wanxiang_yoemin", "Keyboard_wanxiang_english", "Keyboard_wanxiang_18key", "Keyboard_wanxiang_t9"], hint: "ic@palette_swatch_outline", swipe_down: Theme_settings, has_menu: "has_menu_semicolon", key_text_size: 22, __include: "key_style/功能" }
          - { width: 0.15, click: "Return", label: "enter_labels", __include: "key_style/回车" }

  wanxiang_18key: # 18 键布局
    # xlit/qwertyuiopasdfghjklzxcvbnm/qqeettuiopaaddggjklzzcvbbm
    __include: global_offset
    lock: false
    ascii_mode: 0
    label_transform: uppercase # 中文时字母大写显示：uppercase 小写：none
    rows:
      - height: 0.13
        keys:
          - { click: "1", long_click: "!", __include: "key_style/sj" }
          - { click: "2", long_click: "@", __include: "key_style/sj" }
          - { click: "3", long_click: "#", __include: "key_style/sj" }
          - { click: "4", long_click: "$", __include: "key_style/sj" }
          - { click: "5", long_click: "%", __include: "key_style/sj" }
          - { click: "6", long_click: "^", __include: "key_style/sj" }
          - { click: "7", long_click: "&", __include: "key_style/sj" }
          - { click: "8", long_click: "*", __include: "key_style/sj" }
          - { click: "9", long_click: "(", __include: "key_style/sj" }
          - { click: "0", long_click: ")", __include: "key_style/sj" }
      - keys:
          - { click: "q", label: "Q W", label_symbol: "`", swipe_up: "`", popup: ["Q", "W"] }
          - { click: "e", label: "E R", label_symbol: "~", swipe_up: "~", popup: ["E", "R"] }
          - { click: "t", label: "T Y", label_symbol: "+", swipe_up: "+", popup: ["T", "Y"] }
          - { click: "u", label: " U ", label_symbol: "-", swipe_up: "-", long_click: "U", hint: "ic@cursor_move", swipe_down: "Keyboard_edit" }
          - { click: "i", label: " I ", label_symbol: "=", swipe_up: "=", long_click: "I" }
          - { click: "o", label: " O ", label_symbol: "ic@delete_forever", swipe_up: "{", popup: ["O", "DeleteCandidate"] }
          - { click: "p", label: " P ", label_symbol: "ic@pin", swipe_up: "}", popup: ["P", "candtop"] }
      - keys:
          - { width: 0.05, spacer: true }
          - { click: "a", label: "A S", label_symbol: "_", swipe_up: "_", popup: ["A", "S", "select_all"] }
          - { click: "d", label: "D F", label_symbol: ":", swipe_up: ":", popup: ["D", "F"] }
          - { click: "g", label: "G H", label_symbol: "\\", swipe_up: "\\", popup: ["G", "H"] }
          - { click: "j", label: " J ", label_symbol: "ic@pan_left", popup: ["J", "candleft"] }
          - { click: "k", label: " K ", label_symbol: "ic@pan_right", popup: ["K", "candright"] }
          - { click: "l", label: " L ", label_symbol: "ic@lock_reset", popup: ["L", "candreset"] }
          - { width: 0.05, spacer: true }
      - keys:
          - { width: 0.15, click: "Shift_L", long_click: "Mode_switch", double_click: "Shift_L3", key_text_size: 20, key_text_offset_y: 1, __include: "key_style/功能" }
          - { click: "z", label: "Z X", label_symbol: "/", swipe_up: "/", popup: ["Z", "X"] }
          - { click: "c", label: " C ", label_symbol: "ic@content_copy", popup: ["C", "copy"] }
          - { click: "v", label: " V ", label_symbol: "ic@content_paste", popup: ["V", "paste_clip"], swipe_down: "Clipboard_window", hint: "ic@clipboard_list_outline" }
          - { click: "b", label: "B N", label_symbol: "<", swipe_up: "<", popup: ["B", "N"] }
          - { click: "m", label: " M ", label_symbol: ">", swipe_up: ">", long_click: "M" }
          - { width: 0.15, click: "BackSpace", label: "ic@backspace_outline", key_text_size: 20, key_text_offset_y: 1, __include: "key_style/功能" }
      - keys:
          - { width: 0.15, click: "Keyboard_number", label_symbol: "ic@calculator_variant_outline", popup: ["wxcalc", "Refresh", "Deploy"], has_menu: Tab, __include: "key_style/功能" }
          - { click: "'", label_symbol: '"', swipe_up: '"', hint: "ic@lightbulb_outline", swipe_down: "{Hint_switch}", __include: "key_style/功能" }
          - { click: ",", label: "，", label_symbol: "[", swipe_up: "[", hint: "ic@web", swipe_down: IME_switch, __include: "key_style/功能" }
          - { width: 0.3, click: "Space", long_click: "VOICE_ASSIST", hint: "◕‿◕", swipe_down: "liquid_keyboard_switch", key_text_offset_y: 1 }
          - { click: ".", label: "。", label_symbol: "]", swipe_up: "]", hint: "ic@list_box_outline", swipe_down: Menu, __include: "key_style/功能" }
          - { click: "Mode_switch", label_symbol: "ic@keyboard_settings_outline", popup: ["Keyboard_wanxiang_zrm", "Keyboard_wanxiang_yoemin", "Keyboard_wanxiang_english", "Keyboard_wanxiang_18key", "Keyboard_wanxiang_t9"], hint: "ic@palette_swatch_outline", swipe_down: Theme_settings, has_menu: "has_menu_semicolon", key_text_size: 22, __include: "key_style/功能" }
          - { width: 0.15, click: "Return", label: "enter_labels", __include: "key_style/回车" }

# 流式布局  # 液态键盘
liquid_keyboard:
  # 目前只能直接写参数，不支持变量或者fallback机制。
  # 缺少参数时，自动从style中加载参数。除非需要指定liquid_keyboard使用与主键盘不同的背景色、背景图，否则不应设置被注释掉的参数。
  author: "tumuyan"
  row: 6 # 每屏最多显示多少行按键
  row_land: 5 # 横屏每屏最多显示多少行按键
  key_height: 40 # 按键高度
  key_height_land: 50 # 横屏模式按键高度
  single_width: 50 # single类型的按键宽度
  vertical_gap: 4 # 纵向按键间隙
  margin_x: 2 # 左右按键间隙
  fixed_key_bar: # 固定按键条
    position: right # 摆放位置（在滚动区域的……） top|bottom|left|right
    keys: # 按键（显示名称为对应的label，不能放太多）
      - liquid_keyboard_exit
      - { click: "BackSpace", label: "删除" }
      - { click: "Space", label: "空格" }
      - Clipboard_window
      - liquid_keyboard_switch
      - { click: "Return", label: "回车" }
