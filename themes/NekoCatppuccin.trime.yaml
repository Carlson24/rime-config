          - { click: "Up", __include: "key_style/功能" }
          - { click: "candright", label: "推后" }
          - { click: "Keyboard_number", label: "数字", __include: "key_style/功能" }
      - keys:
          - { click: "cut", label: "剪切", __include: "key_style/功能" }
          - { click: "Left", __include: "key_style/功能" }
          - { click: "Shift_L2" }
          - { click: "Right", __include: "key_style/功能" }
          - { click: "Keyboard_edit", __include: "key_style/功能" }
      - keys:
          - { click: "copy", label: "复制", __include: "key_style/功能" }
          - { click: "Page_Up", label: "上页" }
          - { click: "Down", __include: "key_style/功能" }
          - { click: "Page_Down", label: "下页" }
          - { click: "BackSpace", label: "退格", __include: "key_style/功能" }
      - keys:
          - { click: "paste", label: "粘贴", __include: "key_style/功能" }
