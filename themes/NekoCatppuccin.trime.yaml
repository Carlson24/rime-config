# LyraIME 主题配置：NekoCatppuccin
# 基于 Catppuccin 配色的 LyraIME 键盘主题

config_version: "4.0" # Rime 配置版本号（String）
name: NekoCatppuccin # 主题名称（必填）
author: Q_name/莫颜/晨曦 # 主制作：Q_name | 微适配：莫颜 | 二改：火之晨曦

# YAML 全局锚点：字体组合列表，供后续各字体字段引用复用
字体配置: &font_combo [MonaspaceXenon.ttf, LXGWWenKaiMono.ttf, OpenMoji.ttf, CarlsonFont.ttf, SourceHanSans.otf, PlangothicP1.otf, PlangothicP2.otf]

style:
  # ── 键盘高度与边距 ──
  keyboard_height: 250 # 竖屏键盘高度锁定值（Int）
  keyboard_padding: 2 # 竖屏键盘左右边距（Int，增大可减少曲面屏误触）
  keyboard_padding_top: 3 # 竖屏键盘上边距（Int，第一行上方留白）
  keyboard_padding_bottom: 5 # 竖屏键盘下边距（Int，增大可避免触发全面屏手势）
  keyboard_padding_left: 40 # 竖屏左利手布局：屏幕左侧与键盘的间距（Int）
  keyboard_padding_right: 0 # 竖屏右利手布局：屏幕右侧与键盘的间距（Int）
  keyboard_height_land: 150 # 横屏键盘高度锁定值（Int）
  keyboard_padding_land: 40 # 横屏键盘左右边距（Int，避免按键过度拉伸）
  keyboard_padding_land_bottom: 0 # 横屏键盘下边距（Int）

  # ── 字体（List<String>，均为全局锚点引用）──
  latin_font: *font_combo # 西文字体
  text_font: *font_combo # 编码文本字体
  comment_font: *font_combo # 编码提示字体
  candidate_font: *font_combo # 候选字体
  key_font: *font_combo # 按键主字体
  popup_font: *font_combo # 弹窗字体
  label_font: *font_combo # 标签字体
  symbol_font: *font_combo # 符号字体
  hint_font: *font_combo # 助记提示字体
  hanb_font: *font_combo # 扩展汉字字体
  t9_side_font: *font_combo # T9 侧栏字体
  clipboard_font: *font_combo # 剪贴板字体
  clipboard_category_font: *font_combo # 剪贴板分类标签字体

  # ── 字号（Float）──
  comment_text_size: 9 # 候选窗和状态栏编码提示字号
  candidate_text_size: 20 # 候选字号
  key_text_size: 22 # 按键文字字号
  popup_text_size: 20 # 弹窗（按键气泡）字号
  key_long_text_size: 16 # 长标签按键字号
  symbol_text_size: 10 # 符号（上符）字号
  hint_text_size: 10 # 助记提示（下符）字号
  t9_side_text_size: 6 # T9 侧栏字号
  clipboard_text_size: 13 # 剪贴板条目字号
  clipboard_category_text_size: 14 # 剪贴板分类标签字号

  # ── 字体变体设置 ──
  font_variations: # Map<String, Boolean>，OpenType 字体变体开关
    cpct: true
  display_variants: # Map<String, String>，标点符号显示变体映射
    "，": "\uFF0C\uFE01"
    "。": "\u3002\uFE01"
    "？": "\uFF1F\uFE01"
    "！": "\uFF01\uFE01"
    "、": "\u3001\uFE01"
    "：": "\uFF1A\uFE01"
    "；": "\uFF1B\uFE01"

  # ── 候选栏与编码提示 ──
  comment_height: 0 # 编码提示区高度（Int。设为 0 隐藏编码提示区）
  candidate_view_height: 35 # 候选区高度（Int）
  candidate_padding: 4 # 候选项内边距（Int。仅增加左右间距，防止垂直模式悬浮窗偏移）
  candidate_spacing: 1 # 候选分割线宽度（Float）
  comment_position: overlay # 编码提示布局位置（CommentPosition：RIGHT | TOP | OVERLAY）
  candidate_text_vertical_bias: 1.0 # 候选文本垂直偏移（Float，仅 overlay 模式。0.0=上对齐，0.5=居中，1.0=下对齐）
  comment_vertical_bias: 0 # 编码提示垂直偏移（Float，仅 overlay 模式）

  # ── 按键通用设置 ──
  auto_caps: false # 自动句首大写（Boolean）
  reset_ascii_mode_on_focus_change: false # 焦点变更时重置为中文状态（Boolean，false=记忆中英状态；true=重置为中文）
  key_border: 1 # 按键边框宽度（Int）
  vertical_gap: 3 # 按键垂直间距/行距（Int）
  horizontal_gap: 3 # 按键水平间距（Int）
  round_corner: 6 # 按键圆角半径（Float）
  shadow_radius: 1 # 按键阴影半径（Float）
  t9_side_round_corner: 6 # T9 侧栏圆角（Float）
  proximity_correction: true # 按键纠错（Boolean）

  # ── 弹窗/长按预览 ──
  popup_width: 38 # 弹窗宽度（Int）
  popup_height: 55 # 弹窗高度（Int）
  popup_bottom_margin: 68 # 弹窗底部边距（Int，即相对原按键上移的距离）
  popup_key_height: 57 # 弹窗内按键容器高度（Int，建议值：popup_height + 2）

  # ── Enter 键标签 ──
  enter_label_mode: 3 # Enter 键标签模式（Int）：0=不使用 App ActionLabel；1=仅使用；2=优先使用；3=回退使用
  enter_labels: # 各 Action 对应的 Enter 键图标（EnterLabel）
    go: "ic@web"
    done: "ic@check"
    next: "ic@keyboard_return"
    pre: "ic@keyboard_return"
    search: "ic@magnify"
    send: "ic@keyboard_return"
    default: "ic@keyboard_return"

# ── 预编辑文本视图 ──
preedit:
  horizontal_padding: 8 # 横向内边距（Int）
  #  alpha: 0.8 # 透明度，0~1（Float）
  top_end_radius: 5 # 末上端圆角（Float）
  foreground: # 前景样式
    font_size: 16 # 预编辑字体大小（Float）

# ── 候选悬浮窗 ──
window:
  insets: # 窗口内边距
    vertical: 2 # 纵向内边距（Int）
    horizontal: 2 # 横向内边距（Int）
  item_padding: # 候选项内边距
    # vertical: 0 # 纵向内边距（Int）
    horizontal: 4 # 横向内边距（Int）
  #  min_width: 0 # 最小宽度（Int）
  corner_radius: 5 # 圆角半径（Float）
  alpha: 0.85 # 透明度，0~1（Float）
  border: 1 # 边框宽度（Int）
  shadow: 10 # 阴影半径（Float）
  foreground: # 前景样式
    label_font_size: 16 # 序号字体大小（Float）
    text_font_size: 18 # 候选文字字体大小（Float）
    comment_font_size: 12 # 注释字体大小（Float）

# ── 配色方案 ──
# 颜色值使用 0xAARRGGBB 格式，定义在外部文件 NekoCatppuccinColor.yaml
preset_color_schemes:
  default:
    name: "Catppuccin Latte" # 配色显示名称
    dark_scheme: default_dark # 对应的暗色方案 ID
    __include: NekoCatppuccinColor.yaml:/default # 引用外部配色文件中的 default 节点

  default_dark:
    name: "Catppuccin Mocha"
    light_scheme: default # 对应的亮色方案 ID
    __include: NekoCatppuccinColor.yaml:/default_dark

# ── 颜色回退 ──
# 定义颜色键之间的回退链。以下仅覆盖程序内置回退未涵盖的字段
fallback_colors:
  # 按键符号色（程序内置未覆盖，手工指定回退）
  off_key_symbol_color: key_symbol_color
  on_key_symbol_color: hilited_key_symbol_color
  hilited_off_key_symbol_color: hilited_key_symbol_color
  hilited_on_key_symbol_color: hilited_key_symbol_color
  # 候选边框（程序内置未覆盖）
  candidate_border_color: border_color

# ── 预设按键 ──
# 每个按键以唯一 ID 作为映射键名，可在键盘布局中通过 click/long_click/swipe_down 等行为键名引用
preset_keys:
  # 系统按键
  VOICE_ASSIST: { label: "ic@microphone", send: VOICE_ASSIST }

  # Rime 组合键
  CommitRawInput: { label: 編碼, send: Control+Return }
  CommitScriptText: { label: 編碼, send: Shift+Return }
  CommitComment: { label: 編碼, send: Control+Shift+Return }
  DeleteCandidate: { label: "ic@delete_forever", send: Control+Delete }

  # Trime 全局命令
  Deploy: { label: "ic@archive_refresh_outline", send: function, command: apply, option: "DEPLOY" } # 部署
  RepeatCommit: { label: "ic@repeat", command: commit, option: "%1$s" } # 重复上屏内容
  Acode: { label: "ic@code_array", command: run, option: "com.foxdebug.acode" } # 启动 Acode 编辑器
  Sync: { label: "ic@sync", send: function, command: apply, option: "SYNC_USER_DATA" } # 同步用户数据
  Restart: { label: "ic@restart", send: function, command: apply, option: "RESTART_RIME" } # 重启 Rime
  zitools: { label: "ic@magnify", command: run, option: "https://zi.tools/zi/%1$s" } # 用字统网查字

  # Trime 设置/菜单
  IME_switch: { label: "ic@web", send: LANGUAGE_SWITCH } # 弹出输入法切换对话框
  Color_switch: { label: 配色, send: PROG_RED } # 配色切换
  Help: { label: 說明, send: Help } # 帮助
  Info: { label: 關於, send: INFO } # 关于
  Menu: { label: "ic@list_box_outline", send: Menu } # 主菜单
  Settings: { label: "ic@cog_outline", send: SETTINGS } # 通用设置
  Color_settings: { label: "ic@palette_outline", send: SETTINGS, option: "color" } # 配色设置
  Theme_settings: { label: "ic@palette_swatch_outline", send: SETTINGS, option: "theme" } # 皮肤设置
  Schema_settings: { label: 方案, send: SETTINGS, option: "schema" } # 方案设置

  # 状态切换键
  Mode_switch: { toggle: ascii_mode, send: Mode_switch, states: ["\uF830", "\uF831"] } # 中/英模式切换
  Symbol_switch: { toggle: _hide_key_symbol, send: Mode_switch, states: [≡, ️□] } # 上符显示/隐藏
  Hint_switch: { toggle: _hide_key_hint, send: Mode_switch, states: [有助記, 無助記] } # 提示显示/隐藏
  one_hand_switch: { toggle: _one_hand_mode, send: Mode_switch, states: [普通, 单手] } # 单手模式
  floating_keyboard_switch: { toggle: _floating_keyboard, send: Mode_switch, states: ["停靠", "悬浮"] } # 悬浮键盘
  voice_switch: { toggle: _voice_assist, send: Mode_switch, states: ["开始识别", "停止识别"] } # 语音识别

  # 编辑按键
  Home: { label: 首, send: Home }
  Delete: { label: 刪除, send: Delete }
  End: { label: 尾, send: End }
  Page_Up: { label: "ic@page_first", send: Page_Up }
  Page_Down: { label: "ic@page_last", send: Page_Down }
  Left: { label: "ic@arrow_left_bold", repeatable: true, send: Left }
  Down: { label: "ic@arrow_down_bold", repeatable: true, send: Down }
  Up: { label: "ic@arrow_up_bold", repeatable: true, send: Up }
  Right: { label: "ic@arrow_right_bold", repeatable: true, send: Right }
  select_all: { label: "ic@select_all", send: Control+a } # 全选
  Clear: { label: 清除, text: "{Control+a}{BackSpace}" } # 全选并删除
  cut: { label: "ic@content_cut", send: Control+x } # 剪切
  copy: { label: "ic@content_copy", send: Control+c } # 复制
  paste: { label: "ic@content_paste", send: Control+v } # 粘贴
  undo: { label: "ic@rotate_left", repeatable: true, send: Control+z } # 撤销（Android 6.0+）
  redo: { label: "ic@rotate_right", repeatable: true, send: Control+Shift+z } # 重做（Android 6.0+）

  # 主键 / 修饰键 / 功能键
  Ctrl: { label: "ic@apple_keyboard_command", send: Control_L }
  Alt: { label: "ic@apple_keyboard_option", send: Alt_L }
  Escape: { label: "ic@keyboard_esc", send: Escape }
  Tab: { label: "ic@keyboard_tab", repeatable: false, send: Tab }
  Shift_L: { label: "ic@apple_keyboard_shift", functional: true, send: Shift_L, shift_lock: long } # shift_lock：long=长按锁定中英；click=单击锁定
  Shift_L2: { label: 选择, functional: true, send: Shift_L, shift_lock: long } # 编辑模式下的 Shift
  Shift_L3: { label: "ic@apple_keyboard_caps", functional: true, send: Shift_L, shift_lock: click } # 供双击使用，仅 click 模式支持双击
  Return: { label: "ic@keyboard_return", send: Return }
  Hide: { label: "ic@keyboard_close", send: BACK } # 收起键盘
  BackSpace: { label: "ic@backspace_outline", repeatable: true, send: BackSpace }
  Space: { label: "空格", slide_cursor: true, send: space } # 滑动光标
  Refresh: { label: "ic@cookie_refresh_outline", send: function, command: set_theme, option: "" } # 空参数=刷新当前主题

  # T9 键盘专用
  T9_segment: { label: "分词", send: "'" }
  T9_clear: { label: "重输", command: t9_clear }
  # 动态键盘
  Dynamic_clear: { label: "重输", command: dynamic_clear }

  # 液态键盘切换
  liquid_keyboard_history: { send: function, command: liquid_keyboard, option: history } # 历史记录
  liquid_keyboard_switch: { label: "更多", send: function, command: liquid_keyboard, option: 更多 } # 更多符号
  liquid_keyboard_exit: { label: "返回", send: function, command: liquid_keyboard, option: "-1" } # 退出液态键盘
  liquid_keyboard_emoji: { label: "表情", send: function, command: liquid_keyboard, option: 表情 } # 表情页
  liquid_keyboard_cn: { label: "标点", send: function, command: liquid_keyboard, option: 中文 } # 中文标点页
  menu_keyboard: { label: "ic@apps", send: function, command: menu_keyboard } # 菜单键盘
  Clipboard_window: { label: "剪贴", send: function, command: clipboard_window } # 剪贴板窗口

  # 键盘布局切换（Eisu_toggle + select）
  Keyboard_switch: { label: "键盘", send: Eisu_toggle, select: .next } # 轮换布局
  Keyboard_default: { label: "返回", send: Eisu_toggle, select: .default } # 返回主键盘
  Keyboard_lock: { label: "返回", send: Eisu_toggle, select: .last_lock } # 返回上一个锁定的键盘
  Keyboard_number: { label: "ic@numeric", send: Eisu_toggle, select: number }
  Keyboard_edit: { label: "编辑", send: Eisu_toggle, select: edit }
  Keyboard_mini: { label: "迷你", send: Eisu_toggle, select: mini }
  Keyboard_jisuanqi: { label: "计算", send: Eisu_toggle, select: jisuanqi }
  Keyboard_settings: { label: "设置", send: Eisu_toggle, select: settings }

  # 万象键盘切换
  Keyboard_wanxiang_zrm: { label: "\uF83B", send: Eisu_toggle, select: wanxiang_zrm }
  Keyboard_wanxiang_t9: { label: "\uF83E", send: Eisu_toggle, select: wanxiang_t9 }
  Keyboard_wanxiang_18key: { label: "\uF83F", send: Eisu_toggle, select: wanxiang_18key }
  Keyboard_wanxiang_english: { label: "\uF83C", send: Eisu_toggle, select: wanxiang_english }
  Keyboard_wanxiang_yoemin: { label: "\uF83A", send: Eisu_toggle, select: wanxiang_yoemin }

  # 万象方案直接切换（Alt+Shift+按键）
  Schema_wanxiang_zrm: { label: "\uF83B", send: Alt+Shift+z }
  Schema_wanxiang_english: { label: "\uF83C", send: Alt+Shift+e }
  Schema_wanxiang_18key: { label: "\uF83F", send: Alt+Shift+u }
  Schema_wanxiang_t9: { label: "\uF83E", send: Alt+Shift+j }
  Schema_wanxiang_yoemin: { label: "\uF83A", send: Alt+Shift+l }

  # 万象专用辅助键
  fancha: { label: "ic@magnify", text: "{`}" } # 反查
  zaoci: { label: "ic@pen_plus", text: "{`}{`}" } # 造词
  candtop: { label: "ic@pin", send: Control+p } # 候选置顶
  candleft: { label: "ic@pan_left", send: Control+j } # 候选提前
  candright: { label: "ic@pan_right", send: Control+k } # 候选推后
  candreset: { label: "ic@lock_reset", send: Control+l } # 候选排序重置
  wxcalc: { label: "ic@calculator_variant_outline", text: "{Keyboard_jisuanqi}{=}" } # 弹出计算器并输出 =
  yindiao1: { label: "\uF821", send: "6" } # 声调 1
  yindiao2: { label: "\uF822", send: "7" } # 声调 2
  yindiao3: { label: "\uF823", send: "8" } # 声调 3
  yindiao4: { label: "\uF824", send: "9" } # 声调 4
  has_menu_semicolon: { label: "；", send: ";" } # 有候选菜单时的分号按键

# ── 工具栏 ──
tool_bar:
  button_spacing: 4 # 按钮间距（Float）
  button_font: *font_combo # 按钮字体（List<String>）
  back_style: "ic@chevron_triple_left" # 返回图标样式（String）

  primary_button: # 左侧固定主按钮
    action: menu_keyboard # 点击动作（String）
    background: # 背景样式
      type: circle # 高亮形状（circle | rectangle）
      corner_radius: 10 # 圆角半径（Float）
      bg_highlight: hilited_candidate_button_color
      normal: none # 正常状态背景色（String）
      highlight: hilited_candidate_button_color # 高亮状态背景色（String）
      vertical_inset: 4 # 纵向内缩量（Int）
      horizontal_inset: 0 # 横向内缩量（Int）
    foreground: # 前景内容
      font_size: 18 # 按钮字号（Float）
      style: "ic@apps" # 图标样式（String）
      normal: text # 正常状态前景色（String）
      padding: 2 # 前景与背景边界的内边距（Int）

  buttons: # 按钮列表，从右到左排列
    - action: "Hide"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@keyboard_close"
        normal: "text"
    - action: "voice_switch"
      foreground:
        font_size: 18
        padding: 2
        option_styles: ["ic@microphone", "ic@stop_circle"] # 切换状态的双图标（List<String>）
        normal: "text"
    - action: "liquid_keyboard_history"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@sticker_emoji"
        normal: "text"
    - action: "Clipboard_window"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@clipboard_list_outline"
        normal: "text"
    - action: "Keyboard_edit"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@cursor_move"
        normal: "text"
    - action: "redo"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@rotate_right"
        normal: "text"
    - action: "undo"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@rotate_left"
        normal: "text"
    - action: "floating_keyboard_switch"
      foreground:
        font_size: 18
        padding: 2
        option_styles: ["ic@dock_window", "ic@keyboard_outline"] # 切换状态的双图标
        normal: "text"
    - action: "Keyboard_settings"
      foreground:
        font_size: 18
        padding: 2
        style: "ic@cogs"
        normal: "text"

# ── 候选工具栏 ──
candidates_tool:
  nav_width: 41 # 侧边栏宽度（Int）
  background: base # 侧边栏背景色（String，颜色键名）
  button_font: *font_combo # 侧边栏按钮字体（List<String>）
  popup_width: 60 # 长按菜单最大宽度，dp（Int）
  popup_text_size: 18 # 长按菜单文字大小，sp（Float）
  popup_text_color: text # 长按菜单文字颜色（String，颜色键名）
  popup_font: *font_combo # 长按菜单字体（List<String>）
  buttons: # 侧边栏按钮列表，从上到下排列
    - action: "Up"
      foreground:
        style: "ic@arrow_up_bold"
        font_size: 12
    - action: "Down"
      foreground:
        style: "ic@arrow_down_bold"
        font_size: 12
    - action: "BackSpace"
      foreground:
        style: "ic@backspace_outline"
        font_size: 22
    - action: "CommitScriptText"
      foreground:
        style: "ic@keyboard_return"
        font_size: 22
  popup: # 候选长按菜单项
    - action: "candleft"
      label: "提前"
    - action: "candright"
      label: "推后"
    - action: "candtop"
      label: "置顶"
    - action: "candreset"
      label: "重置"
    - action: "DeleteCandidate"
      label: "删除"

# ── 按键样式预设 ──
# 定义可复用的配色引用字段，供键盘布局按键通过 __include 引用
key_style:
  功能: # 功能键样式
    key_text_size: 16
    key_back_color: off_key_back_color
    hilited_key_back_color: hilited_off_key_back_color
    key_text_color: off_key_text_color
    hilited_key_text_color: hilited_off_key_text_color
    key_symbol_color: off_key_text_color
    hilited_key_symbol_color: off_key_text_color
  数字: # 数字行样式（继承功能键样式）
    __include: "key_style/功能"
    key_text_size: 20
    symbol_text_size: 8.5
    key_text_offset_y: 4
    key_symbol_offset_y: -0.5
  回车: # 回车键样式
    key_text_size: 20
    key_back_color: lavender
    hilited_key_back_color: overlay2
    key_text_color: text
    hilited_key_text_color: text
    key_symbol_color: text
    hilited_key_symbol_color: text
    key_border_color: lavender
  menu_key: # 菜单/设置大按钮样式
    key_text_size: 40
    symbol_text_size: 12
    key_back_color: keyboard_background
  lssp_zj: # 李氏三拼主按键样式
    key_text_size: 22
    key_hint_offset_y: 0.5
  global_offset: # 全局按键偏移（Float）
    key_symbol_offset_x: 0
    key_symbol_offset_y: 3
    key_text_offset_y: 0
    key_hint_offset_y: -3
    key_press_offset_y: 2
  uphelp_offset: # 万象上提示偏移
    key_text_offset_x: -11
    key_text_offset_y: -16
    key_hint_offset_y: -13
    key_symbol_offset_x: 5

# ── 预设键盘布局 ──
# 每个键盘以唯一 ID 作为映射键名
preset_keyboards:
  # 李氏三拼 3x5a 布局（外部引用）
  __include: "NekoCatppuccinlssp3x5a.yaml:/preset_keyboards"

  # 默认主键盘（拼音/双拼 30 键）
  default:
    __include: key_style/global_offset # 引用全局偏移
    lock: false # 切换应用时记忆键盘（Boolean）
    ascii_mode: 0 # ASCII 模式：0=中文，1=英文（Boolean）
    reset_ascii_mode: true # 显示时重置为 ascii_mode 状态（Boolean）
    label_transform: none # 中文时字母显示：uppercase=大写，none=原样（LabelTransform）
    rows:
      - height: 0.13 # 行高度比例（Float）
        keys:
          - { click: "1", label_symbol: "!", swipe_up: "!", __include: "key_style/数字" }
          - { click: "2", label_symbol: "@", swipe_up: "@", __include: "key_style/数字" }
          - { click: "3", label_symbol: "#", swipe_up: "#", __include: "key_style/数字" }
          - { click: "4", label_symbol: "$", swipe_up: "$", __include: "key_style/数字" }
          - { click: "5", label_symbol: "%", swipe_up: "%", __include: "key_style/数字" }
          - { click: "6", label_symbol: "^", swipe_up: "^", __include: "key_style/数字" }
          - { click: "7", label_symbol: "&", swipe_up: "&", __include: "key_style/数字" }
          - { click: "8", label_symbol: "*", swipe_up: "*", __include: "key_style/数字" }
          - { click: "9", label_symbol: "(", swipe_up: "(", __include: "key_style/数字" }
          - { click: "0", label_symbol: ")", swipe_up: ")", __include: "key_style/数字" }
      - keys:
          - { click: "q", label_symbol: "`", swipe_up: "`", popup: ["Q"] }
          - { click: "w", label_symbol: "~", swipe_up: "~", popup: ["W"] }
          - { click: "e", label_symbol: "+", swipe_up: "+", popup: ["E"] }
          - { click: "r", label_symbol: "-", swipe_up: "-", popup: ["R"] }
          - { click: "t", label_symbol: "=", swipe_up: "=", popup: ["T"] }
          - { click: "y", label_symbol: "_", swipe_up: "_", popup: ["Y"] }
          - { click: "u", label_symbol: "{", swipe_up: "{", popup: ["U"] }
          - { click: "i", label_symbol: "}", swipe_up: "}", popup: ["I"] }
          - { click: "o", label_symbol: "ic@delete_forever", popup: ["O", "DeleteCandidate"] }
          - { click: "p", label_symbol: "×", swipe_up: "×", popup: ["P"] }
      - keys:
          - { width: 0.05, spacer: true }
          - { click: "a", label_symbol: "ic@select_all", popup: ["A", "select_all"] }
          - { click: "s", label_symbol: ":", swipe_up: ":", popup: ["S"] }
          - { click: "d", label_symbol: "|", swipe_up: "|", popup: ["D"] }
          - { click: "f", label_symbol: ";", swipe_up: ";", popup: ["F", "·", "§"] }
          - { click: "g", label_symbol: "ic@apps", popup: ["G", "menu_keyboard"], hint: "ic@cursor_move", swipe_down: "Keyboard_edit" } # hint=助记提示；swipe_down=下滑动作
          - { click: "h", label_symbol: "?", swipe_up: "?", popup: ["H", "?", "¿"] }
          - { click: "j", label_symbol: "ic@pan_left", popup: ["J", "Page_Up"] }
          - { click: "k", label_symbol: "ic@pan_right", popup: ["K", "Page_Down"] }
          - { click: "l", label_symbol: "÷", swipe_up: "÷", popup: ["L"] }
          - { width: 0.05, spacer: true }
      - keys:
          - { width: 0.15, click: "Shift_L", double_click: "Shift_L3", label_symbol: "ic@keyboard_caps", key_text_size: 20, __include: "key_style/功能" }
          - { click: "z", label_symbol: "\\", swipe_up: "\\", popup: ["Z"] }
          - { click: "x", label_symbol: "ic@content_cut", popup: ["X", "cut"] }
          - { click: "c", label_symbol: "ic@content_copy", popup: ["C", "copy"] }
          - { click: "v", label_symbol: "ic@content_paste", popup: ["V", "paste"], hint: "ic@clipboard_list_outline", swipe_down: "Clipboard_window" }
          - { click: "b", label_symbol: "/", swipe_up: "/", popup: ["B", "zitools"] }
          - { click: "n", label_symbol: "<", swipe_up: "<", popup: ["N"] }
          - { click: "m", label_symbol: ">", swipe_up: ">", popup: ["M"] }
          - { width: 0.15, click: "BackSpace", label: "ic@backspace_outline", key_text_size: 20, __include: "key_style/功能" }
      - keys:
          - { width: 0.15, click: "Keyboard_number", label_symbol: "ic@calculator_variant_outline", popup: ["wxcalc", "Refresh", "Deploy"], has_menu: Tab, key_text_size: 20, __include: "key_style/功能" } # has_menu=有候选菜单时触发
          - { click: "'", label_symbol: '"', swipe_up: '"', hint: "ic@lightbulb_outline", swipe_down: "{Hint_switch}", __include: "key_style/功能" }
          - { click: ",", label: "，", label_symbol: "[", swipe_up: "[", hint: "ic@web", swipe_down: IME_switch, __include: "key_style/功能" }
          - { width: 0.3, click: "Space", label: "天文馆的猫", long_click: "VOICE_ASSIST", hint: "◕‿◕", swipe_down: "liquid_keyboard_switch", key_text_offset_y: 1 } # long_click=长按动作
          - { click: ".", label: "。", label_symbol: "]", swipe_up: "]", hint: "ic@list_box_outline", swipe_down: Menu, __include: "key_style/功能" }
          - { click: "Mode_switch", label_symbol: "ic@keyboard_settings_outline", popup: ["Keyboard_wanxiang_zrm", "Keyboard_wanxiang_yoemin", "Keyboard_wanxiang_english", "Keyboard_wanxiang_18key", "Keyboard_wanxiang_t9"], hint: "ic@palette_swatch_outline", swipe_down: Theme_settings, has_menu: "has_menu_semicolon", key_text_size: 20, __include: "key_style/功能" }
          - { width: 0.15, click: "Return", label: "enter_labels", __include: "key_style/回车" }

  # 数字键盘
  number:
    __include: key_style/global_offset
    lock: false
    ascii_mode: 1
    reset_ascii_mode: true
    rows:
      - keys:
          - { click: "+", long_click: "X", __include: "key_style/功能" }
          - { click: "-", long_click: "~", __include: "key_style/功能" }
          - { click: "1" }
          - { click: "2" }
          - { click: "3" }
          - { click: "Keyboard_default", __include: "key_style/功能" }
      - keys:
          - { click: "*", long_click: "×", swipe_up: "㎡", __include: "key_style/功能" }
          - { click: "/", long_click: "÷", swipe_up: "㎥", swipe_down: "／", __include: "key_style/功能" }
          - { click: "4" }
          - { click: "5" }
          - { click: "6" }
          - { click: "Space", __include: "key_style/功能" }
      - keys:
          - { click: "(){Left}", long_click: "[]{Left}", __include: "key_style/功能" }
          - { click: "=", long_click: "≠", __include: "key_style/功能" }
          - { click: "7" }
          - { click: "8" }
          - { click: "9" }
          - { click: "BackSpace", label: "退格", swipe_up: Clear, key_text_size: 22, __include: "key_style/功能" }
      - keys:
          - { click: "liquid_keyboard_cn", long_click: ",", __include: "key_style/功能" }
          - { click: "liquid_keyboard_emoji", long_click: "±", __include: "key_style/功能" }
          - { click: "Keyboard_edit", long_click: "%", __include: "key_style/功能" }
          - { click: "0", long_click: "@" }
          - { click: ".", long_click: "^", swipe_up: "·", __include: "key_style/功能" }
          - { click: "Return", label: "回车", __include: "key_style/回车" }

  # 计算器键盘（支持数学函数表达式求值）
  jisuanqi:
    __include: key_style/global_offset
    lock: false
    ascii_mode: 0
    reset_ascii_mode: true
    key_symbol_offset_y: 0
    rows:
      - keys:
          - { width: 0.02, spacer: true }
          - { click: "sum", long_click: "max" }
          - { click: "avg", long_click: "min" }
          - { click: "sin", long_click: "asin" }
          - { click: "cos", long_click: "acos" }
          - { click: "tan", long_click: "atan" }
          - { click: "BackSpace", key_text_size: 22, key_text_offset_y: 1, __include: "key_style/功能" }
          - { width: 0.02, spacer: true }
      - keys:
          - { width: 0.02, spacer: true }
          - { click: "log", long_click: "map" }
          - { click: "ln", long_click: "exp" }
          - { click: "sqrt", long_click: "abs", label: "ˣ√￣" }
          - { click: "^", long_click: "fac" }
          - { click: "%", long_click: "mod" }
          - { click: "/", long_click: '\' }
          - { width: 0.02, spacer: true }
      - keys:
          - { width: 0.02, spacer: true }
          - { click: "{", long_click: "$" }
          - { click: "}", long_click: "x" }
          - { click: "1" }
          - { click: "2" }
          - { click: "3" }
          - { click: "*", long_click: "trunc" }
          - { width: 0.02, spacer: true }
      - keys:
          - { width: 0.02, spacer: true }
          - { click: "(", long_click: "rad" }
          - { click: ")", long_click: "deg" }
          - { click: "4" }
          - { click: "5" }
          - { click: "6" }
          - { click: "+", long_click: "ceil" }
          - { width: 0.02, spacer: true }
      - keys:
          - { width: 0.02, spacer: true }
          - { click: "=", long_click: "|" }
          - { click: "pi", long_click: "e", label: "π" }
          - { click: "7" }
          - { click: "8" }
          - { click: "9" }
          - { click: "-", long_click: "floor" }
          - { width: 0.02, spacer: true }
      - keys:
          - { width: 0.02, spacer: true }
          - { click: "Keyboard_default", long_click: "deriv", key_text_offset_y: 1, __include: "key_style/功能" }
          - { click: ",", long_click: "integ" }
          - { click: "Space", label: "输出", long_click: "random", key_text_offset_y: 1, __include: "key_style/功能" }
          - { click: "0" }
          - { click: ".", long_click: "range" }
          - { click: "Return", __include: "key_style/回车" }
          - { width: 0.02, spacer: true }

  # 编辑/工具栏键盘
  edit:
    __include: key_style/global_offset
    lock: false
    ascii_mode: 0
    reset_ascii_mode: true
    rows:
      - keys:
          - { click: "Clipboard_window", label: "剪贴", __include: "key_style/功能" }
