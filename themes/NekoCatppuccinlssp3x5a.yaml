# @format

preset_keyboards:
  triple_pinyin_lssp:
    __include: "NekoCatppuccin.trime.yaml:/global_offset"
    lock: false
    ascii_mode: 0
    label_transform: none
    rows:
      - height: 0.13
        keys:
          - { click: "1", label_symbol: "!", swipe_up: "!", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "2", label_symbol: "@", swipe_up: "@", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "3", label_symbol: "#", swipe_up: "#", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "4", label_symbol: "$", swipe_up: "$", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "5", label_symbol: "%", swipe_up: "%", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "6", label_symbol: "^", swipe_up: "^", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "7", label_symbol: "&", swipe_up: "&", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "8", label_symbol: "*", swipe_up: "*", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "9", label_symbol: "(", swipe_up: "(", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
          - { click: "0", label_symbol: ")", swipe_up: ")", __include: "NekoCatppuccin.trime.yaml:/key_style/sj" }
      - keys:
          - { width: 0.125, click: "fancha", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { click: "q", label: "b", label_symbol: "<l> B/A</l><r>~ </r>", swipe_up: "~", popup: ["B", "A"], hint: "a,an,ang", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "w", label: "p", label_symbol: "<l> P/E</l><r>\\< </r>", swipe_up: "<", popup: ["P", "E"], hint: "ai,ei,ao", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "e", label: "m", label_symbol: "<l> M/O</l><r>\\ </r>", swipe_up: "\\", popup: ["M", "O"], hint: "o,ou,ong", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "r", label: "r <b>f</b>", label_symbol: "<l> R/F</l><r>> </r>", swipe_up: ">", popup: ["R", "F"], hint: "e,en,eng", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "t", label: "zh <b>z</b>", label_symbol: "<l> V/Z</l><r>+ </r>", swipe_up: "+", popup: ["V", "Z"], hint: "er,üan", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { width: 0.125, click: "BackSpace", label: "ic@backspace_outline", key_text_size: 20, __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
      - keys:
          - { width: 0.125, click: "Up", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { click: "a", label: "d", label_symbol: "<l> D/<c=mauve><b>一</b></c></l><r>_ </r>", swipe_up: "_", popup: ["D"], hint: "ia,ian,iang", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "s", label: "t", label_symbol: "<l> T/<c=mauve><b>丨</b></c></l><r>; </r>", swipe_up: ";", popup: ["T", "·", "§"], hint: "iai,i,iao", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "d", label: "n", label_symbol: "<l> N/<c=mauve><b>丿</b></c></l><r>| </r>", swipe_up: "|", popup: ["N"], hint: "io,iu,iong", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "f", label: "l", label_symbol: "<l> L/<c=mauve><b>丶</b></c></l><r>? </r>", swipe_up: "?", popup: ["L", "?", "¿"], hint: "ie,in,ing", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "g", label: "ch <b>c</b>", label_symbol: "<l> I/C/<c=mauve><b>𠃋</b></c></l><r>- </r>", swipe_up: "-", popup: ["I", "C"], hint: "ü", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { width: 0.125, click: "Left", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
      - keys:
          - { width: 0.125, click: "Down", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { click: "z", label: "g <b>j</b>", label_symbol: "<l> G/J</l><r>: </r>", swipe_up: ":", popup: ["G", "J"], hint: "ua,uan,uang", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "x", label: "k <b>q</b>", label_symbol: "<l> K/Q</l><r>'ic@content_copy' </r>", popup: ["K", "Q", "copy"], hint: "uai,ui", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "c", label: "h <b>x</b>", label_symbol: "<l> H/X</l><r>'ic@content_paste' </r>", popup: ["H", "X", "paste"], hint: "uo,u", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "v", label: "w <b>y</b>", label_symbol: "<l> W/Y</l><r>/ </r>", swipe_up: "/", popup: ["W", "Y"], hint: "∅,un,ueng", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { click: "b", label: "sh <b>s</b>", label_symbol: "<l> U/S</l><r>= </r>", swipe_up: "=", popup: ["U", "S"], hint: "üe,ün", __include: "NekoCatppuccin.trime.yaml:/key_style/lssp_zj" }
          - { width: 0.125, click: "Right", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
      - keys:
          - { width: 0.125, click: "Keyboard_number", label_symbol: "ic@calculator_variant_outline", popup: ["wxcalc", "Refresh", "Deploy"], has_menu: Tab, key_text_size: 20, __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { click: "'", label_symbol: '"', swipe_up: '"', hint: "ic@lightbulb_outline", swipe_down: "{Hint_switch}", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { click: ",", label: "，", label_symbol: "[", swipe_up: "[", hint: "ic@web", swipe_down: IME_switch, __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { width: 0.35, click: "Space", long_click: "VOICE_ASSIST", hint: "◕‿◕", swipe_down: "liquid_keyboard_switch", key_text_offset_y: 1 }
          - { click: ".", label: "。", label_symbol: "]", swipe_up: "]", hint: "ic@list_box_outline", swipe_down: Menu, __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { click: "Mode_switch", label_symbol: "ic@keyboard_settings_outline", popup: ["Keyboard_wanxiang_zrm", "Keyboard_wanxiang_yoemin", "Keyboard_wanxiang_english", "Keyboard_wanxiang_18key", "Keyboard_wanxiang_t9"], hint: "ic@palette_swatch_outline", swipe_down: Theme_settings, has_menu: "has_menu_semicolon", __include: "NekoCatppuccin.trime.yaml:/key_style/功能" }
          - { width: 0.125, click: "Return", label: "enter_labels", __include: "NekoCatppuccin.trime.yaml:/key_style/回车" }

