# Trime default style settings
# encoding: utf-8

config_version: "3.0"
name: NekoCatppuccin
author: Q_name/莫颜/晨曦 # 主制作：Q_name ，微配适：莫颜，二改：火之晨曦

# 全局锚点
字体配置: &font_combo [MonaspaceXenon.ttf, LXGWWenKaiMono.ttf, OpenMoji.ttf, CarlsonFont.ttf, SourceHanSans.otf, PlangothicP1.otf, PlangothicP2.otf]

style:
  # 锁定总高度、边距
  # 竖屏键盘
  keyboard_height: 250 # 竖屏高
  keyboard_padding: 2 # 竖屏时，屏幕左右两侧与键盘的距离（曲面屏减少误触）
  keyboard_padding_top: 3 # 第一行上方留白
  keyboard_padding_bottom: 5 # 竖屏时，屏幕底部与键盘的距离（避免误触发全面屏手势）
  keyboard_padding_left: 40 # 竖屏时，左手键盘布局，屏幕左侧与键盘的距离
  keyboard_padding_right: 0 # 竖屏时，右手键盘布局，屏幕右侧与键盘的距离
  # 横屏键盘
  keyboard_height_land: 150 # 横屏高
  keyboard_padding_land: 40 # 横屏时，屏幕左右两侧与键盘的距离（避免横屏按键过度拉伸变形）
  keyboard_padding_land_bottom: 0 # 横屏时，屏幕底部与键盘的距离（避免误触发全面屏手势）

  # 字体
  latin_font: *font_combo # latin.ttf # 西文字型
  text_font: *font_combo # latin.ttf # 编码字型
  comment_font: *font_combo # comment.ttf # 編碼提示字型
  candidate_font: *font_combo # han.ttf # 候选字型
  key_font: *font_combo # symbol.ttf # 按键字型
  popup_font: *font_combo # latin.ttf # 按键气泡字型
  label_font: *font_combo # label.ttf # 悬浮窗序号字型
  symbol_font: *font_combo # symbol.ttf # 符号字型
  hint_font: *font_combo # hint.ttf # 按键提示字体
  hanb_font: *font_combo # 扩充字型
  t9_side_font: *font_combo # t9侧边字体
  clipboard_font: *font_combo # 剪贴板字体
  clipboard_category_font: *font_combo # 剪贴板分类字体
  # 字号
  comment_text_size: 9 # 候选窗和状态栏提示字号
  candidate_text_size: 20 # 候选字号
  key_text_size: 22 # 按键字号
  popup_text_size: 16 # 按键气泡字号
  key_long_text_size: 16 # 长文本按键字号
  symbol_text_size: 10 # 上符字号
  hint_text_size: 10 # 下符字号
  t9_side_text_size: 6 # t9侧边文本字号
  clipboard_text_size: 13 # 剪贴板字号
  clipboard_category_text_size: 14 # 剪贴板分类字号
  # OpenType字体变体设置
  font_variations:
    cpct: true
  display_variants:
    "，": "\uFF0C\uFE01"
    "。": "\u3002\uFE01"
    "？": "\uFF1F\uFE01"
    "！": "\uFF01\uFE01"
    "、": "\u3001\uFE01"
    "：": "\uFF1A\uFE01"
    "；": "\uFF1B\uFE01"

  # 状态栏（部分参数悬浮窗同步生效）
  comment_height: 0 # 状态栏高度（上排）
  candidate_view_height: 35 # 状态栏高度（下排）
  candidate_padding: 4 # 候选项（悬浮窗）内边距  # candidate_padding 上下左右都增加边距；现在改成horizontal_padding只增加左右边距，防止垂直模式悬浮窗上天。
  candidate_spacing: 1 # 候选项（悬浮窗）间距
  comment_position: overlay # 注释使用覆盖样式
  candidate_text_vertical_bias: 1.0 # 候选垂直偏移
  comment_vertical_bias: 0 # 注释垂直偏移

  # 语言/键盘
  # background_folder: # 背景图保存在background目录下的哪个子目录
  auto_caps: false # 自动句首大写:true|false|ascii
  reset_ascii_mode_on_focus_change: false # 不同进程中显示键盘时重置为中文状态（true:重置为中文；false:记忆中英状态）
  key_border: 1 # 按键边框宽度
  vertical_gap: 3 # 按键行距
  horizontal_gap: 3 # 按键列距
  round_corner: 6 # 按鍵圓角半徑
  shadow_radius: 1 # 按键阴影半径
  t9_side_round_corner: 6 # t9侧边圆角半径
  popup_width: 38 # 按键气泡宽度  # 每夜版2025.11.14起  新启用，popup替代preview
  popup_height: 55 # 按键气泡高度
  popup_bottom_margin: 68 # 按键气泡底部边距（较原始按键上移距离）
  popup_key_height: 57 # 按键气泡内键（容器）高度；跟随按键气泡高度，也可为数值（建议值：按键气泡高度+2）
  proximity_correction: true # 按键纠错
  enter_label_mode: 3 # 是否使用App提供的ActionLabel内容作为Enter键的文本（由于多数App没有适配ActionLable，实际影响不大）。0不使用，1只使用actionlabel，2优先使用，3当其他方式没有获得label时才读取actionlabel
  enter_labels:
    go: "ic@web"
    done: "ic@check"
    next: "ic@send_circle"
    pre: "ic@send_circle"
    search: "ic@magnify"
    send: "ic@send_circle"
    default: "ic@send_circle"

# 预编辑（编码区）文本视图参数
preedit: # 预编辑文本视图参数
  horizontal_padding: 8 # 横向内边距（整数）
  #  alpha: 0.8                     # 透明度（0-1，浮点）
  top_end_radius: 5 # 末上端圆角（浮点）
  foreground: # 前景样式
    font_size: 16 # 预编辑字体大小（浮点）

# 悬浮窗（候选窗口）
window: # 候选窗口（悬浮窗）参数
  insets: # 窗口内边距
    vertical: 2 # 纵向内边距（整数）
    horizontal: 2 # 横向内边距（整数）
  item_padding: # 候选项内边距
    # vertical: 0                  # 纵向内边距（整数）
    horizontal: 4 # 横向内边距（整数）
  #  min_width: 0                   # 最小宽度（整数）
  corner_radius: 5 # 圆角半径（浮点）
  alpha: 0.85 # 透明度（0-1，浮点）
  border: 1
  shadow: 10
  foreground: # 前景样式
    label_font_size: 16 # 序号字体大小（浮点）
    text_font_size: 18 # 文字字体大小（浮点）
    comment_font_size: 12 # 注释字体大小（浮点）

key_style: # 键盘配色引用字段
  功能: # 功能键
    key_text_size: 16
    key_back_color: off_key_back_color
    hilited_key_back_color: hilited_off_key_back_color
    key_text_color: off_key_text_color
    hilited_key_text_color: hilited_off_key_text_color
    key_symbol_color: off_key_text_color
    hilited_key_symbol_color: off_key_text_color
  sj: # 数字行
    __include: "key_style/功能"
    key_text_size: 20
    symbol_text_size: 8.5
    key_text_offset_y: 4
    key_symbol_offset_y: -0.5
  回车:
    key_text_size: 20
    key_back_color: enter_background
    hilited_key_back_color: off_enter_background
    key_text_color: enter_text
    hilited_key_text_color: enter_text
    key_symbol_color: enter_text
    hilited_key_symbol_color: enter_text
    key_border_color: enter_background
  menu_key:
    key_text_size: 40
    symbol_text_size: 12
    key_back_color: keyboard_background
  lssp_zj:
    key_text_size: 22
    key_hint_offset_y: 0.5
# 后备配色
fallback_colors: # 只需要这些，其他可以自动生成
  # 按键符号色（Builtin未覆盖）
  off_key_symbol_color: key_symbol_color
  on_key_symbol_color: hilited_key_symbol_color
  hilited_off_key_symbol_color: hilited_key_symbol_color
  hilited_on_key_symbol_color: hilited_key_symbol_color
  # 候选边框（Builtin未覆盖）
  candidate_border_color: border_color

# 配色方案
preset_color_schemes:
  default:
    name: "Catppuccin Latte"
    dark_scheme: default_dark
    __include: NekoCatppuccinColor.yaml:/default

  default_dark:
    name: "Catppuccin Mocha"
    light_scheme: default
    __include: NekoCatppuccinColor.yaml:/default_dark

preset_keys:
  # 安卓
  VOICE_ASSIST: { label: "ic@microphone", send: VOICE_ASSIST }

  # rime組合鍵
  CommitRawInput: { label: 編碼, send: Control+Return }
  CommitScriptText: { label: 編碼, send: Shift+Return }
  CommitComment: { label: 編碼, send: Control+Shift+Return }
  DeleteCandidate: { label: "ic@delete_forever", send: Control+Delete }

  # trime命令
  Deploy: { label: "ic@archive_refresh_outline", send: function, command: apply, option: "DEPLOY" }
  RepeatCommit: { label: "ic@repeat", command: commit, option: "%1$s" } # 重复输入刚上屏的内容
  Acode: { label: "ic@code_array", command: run, option: "com.foxdebug.acode" }
  Sync: { label: "ic@sync", send: function, command: apply, option: "SYNC_USER_DATA" }
  Restart: { label: "ic@restart", send: function, command: apply, option: "RESTART_RIME" }
  zitools: { label: "ic@magnify", command: run, option: "https://zi.tools/zi/%1$s" }
  # trime設定
  IME_switch: { label: "ic@web", send: LANGUAGE_SWITCH } # 彈出對話框選擇輸入法
  Color_switch: { label: 配色, send: PROG_RED }
  Help: { label: 說明, send: Help }
  Info: { label: 關於, send: INFO }
  Menu: { label: "ic@list_box_outline", send: Menu }
  Settings: { label: "ic@cog_outline", send: SETTINGS }
  Color_settings: { label: "ic@palette_outline", send: SETTINGS, option: "color" }
  Theme_settings: { label: "ic@palette_swatch_outline", send: SETTINGS, option: "theme" }
  Schema_settings: { label: 方案, send: SETTINGS, option: "schema" }

  Mode_switch: { toggle: ascii_mode, send: Mode_switch, states: ["\uF830", "\uF831"] }
  Symbol_switch: { toggle: _hide_key_symbol, send: Mode_switch, states: [≡, ️□] } # 上符隐藏，lable显示定义无法去除
  Hint_switch: { toggle: _hide_key_hint, send: Mode_switch, states: [有助記, 無助記] }
  one_hand_switch: { toggle: _one_hand_mode, send: Mode_switch, states: [普通, 单手] }
  floating_keyboard_switch: { toggle: _floating_keyboard, send: Mode_switch, states: ["停靠", "悬浮"] }
  voice_switch: { toggle: _voice_assist, send: Mode_switch, states: ["开始识别", "停止识别"] }

  # 編輯
  Escape: { label: Esc, send: Escape }
  Home: { label: 首, send: Home }
  Delete: { label: 刪除, send: Delete }
  End: { label: 尾, send: End }
  Page_Up: { label: "ic@page_first", send: Page_Up }
  Page_Down: { label: "ic@page_last", send: Page_Down }
  Left: { label: "ic@arrow_left_bold", repeatable: true, send: Left }
  Down: { label: "ic@arrow_down_bold", repeatable: true, send: Down }
  Up: { label: "ic@arrow_up_bold", repeatable: true, send: Up }
  Right: { label: "ic@arrow_right_bold", repeatable: true, send: Right }
  select_all: { label: "ic@select_all", send: Control+a }
  Clear: { label: 清除, text: "{Control+a}{BackSpace}" } # 全選並刪除
  cut: { label: "ic@content_cut", send: Control+x }
  copy: { label: "ic@content_copy", send: Control+c }
  paste: { label: "ic@content_paste", send: Control+v }
  undo: { label: "ic@rotate_left", repeatable: true, send: Control+z } # >=Android 6.0
  redo: { label: "ic@rotate_right", repeatable: true, send: Control+Shift+z } # >=Android 6.0

  # 键盘切换、主键
  Ctrl: { label: "⌘", send: Control_L }
  Alt: { label: "⌥", send: Alt_L }
  Esc: { label: "⎋", send: Escape }
  Tab: { label: "ic@keyboard_tab", repeatable: false, send: Tab }
  Shift_L: { label: "ic@apple_keyboard_caps", functional: true, send: Shift_L, shift_lock: long } # long中英状态长按锁定｜ascii_long英文長按中文單按鎖定｜click單按鎖定
  Shift_L2: { label: 选择, functional: true, send: Shift_L, shift_lock: long }
  Shift_L3: { functional: true, send: Shift_L, shift_lock: click } # 供双击使用，仅shift_lock: click支持双击
  Return: { label: "ic@send_circle", send: Return }
  Hide: { label: "ic@keyboard_close", send: BACK }
  BackSpace: { label: "ic@backspace_outline", repeatable: true, send: BackSpace }
  Space: { label: "天文馆的猫", slide_cursor: true, send: space }
  Refresh: { label: "ic@cookie_refresh_outline", send: function, command: set_theme, option: "" } # 空参数为刷新主题

  # T9 键盘
  T9_segment: { label: "分词", send: "'" }
  T9_clear: { label: "重输", command: t9_clear }
  # 动态键盘
  Dynamic_clear: { label: "重输", command: dynamic_clear }

  # 键盘切换
  liquid_keyboard_history: { send: function, command: liquid_keyboard, option: history }
  liquid_keyboard_switch: { label: "更多", send: function, command: liquid_keyboard, option: 更多 }
  liquid_keyboard_exit: { label: "返回", send: function, command: liquid_keyboard, option: "-1" } # 退出liquidkeyboard
  liquid_keyboard_emoji: { label: "表情", send: function, command: liquid_keyboard, option: 表情 }
  liquid_keyboard_cn: { label: "标点", send: function, command: liquid_keyboard, option: 中文 }
  menu_keyboard: { label: "ic@apps", send: function, command: menu_keyboard }
  Clipboard_window: { label: "剪贴", send: function, command: clipboard_window }

  Keyboard_switch: { label: "键盘", send: Eisu_toggle, select: .next } # 轮换布局
  Keyboard_default: { label: "返回", send: Eisu_toggle, select: .default } # 返回主键盘
  Keyboard_lock: { label: "返回", send: Eisu_toggle, select: .last_lock } # 返回上一个锁定的键盘
  Keyboard_number: { label: "ic@numeric", send: Eisu_toggle, select: number }
  Keyboard_edit: { label: "编辑", send: Eisu_toggle, select: edit }
  Keyboard_mini: { label: "迷你", send: Eisu_toggle, select: mini }
  Keyboard_jisuanqi: { label: "计算", send: Eisu_toggle, select: jisuanqi }
  Keyboard_settings: { label: "设置", send: Eisu_toggle, select: settings }

  Keyboard_wanxiang_zrm: { label: "\uF83B", send: Eisu_toggle, select: wanxiang_zrm }
  Keyboard_wanxiang_t9: { label: "\uF83E", send: Eisu_toggle, select: wanxiang_t9 }
  Keyboard_wanxiang_18key: { label: "\uF83F", send: Eisu_toggle, select: wanxiang_18key }
  Keyboard_wanxiang_english: { label: "\uF83C", send: Eisu_toggle, select: wanxiang_english }
  Keyboard_wanxiang_yoemin: { label: "\uF83A", send: Eisu_toggle, select: wanxiang_yoemin }

  Schema_wanxiang_zrm: { label: "\uF83B", send: Alt+Shift+z }
  Schema_wanxiang_english: { label: "\uF83C", send: Alt+Shift+e }
  Schema_wanxiang_18key: { label: "\uF83F", send: Alt+Shift+u }
  Schema_wanxiang_t9: { label: "\uF83E", send: Alt+Shift+j }
  Schema_wanxiang_yoemin: { label: "\uF83A", send: Alt+Shift+l }

  # 万象专有的
  fancha: { label: "ic@magnify", text: "{`}" }
  zaoci: { label: "造词", text: "{`}{`}" }
  candtop: { label: "ic@pin", send: Control+p }
  candleft: { label: "ic@pan_left", send: Control+j }
  candright: { label: "ic@pan_right", send: Control+k }
  candreset: { label: "ic@lock_reset", send: Control+l }
  wxcalc: { label: "ic@calculator_variant_outline", text: "{Keyboard_jisuanqi}{=}" }
  yindiao1: { label: "\uF821", send: "6" }
  yindiao2: { label: "\uF822", send: "7" }
  yindiao3: { label: "\uF823", send: "8" }
  yindiao4: { label: "\uF824", send: "9" }
  has_menu_semicolon: { label: "；", send: ";" }

tool_bar: # 工具老布局
  button_spacing: 4 # 按钮间距
  button_font: *font_combo # 按钮字体
  back_style: "ic@chevron_triple_left"

  # 左侧固定主按钮配置
  primary_button:
    # 背景样式设置
    background:
      type: circle # 高亮形状 (可选值: circle|rectangle)
      corner_radius: 10 # 圆角半径
      bg_highlight: hilited_candidate_button_color
      normal: 0x00 # 正常状态背景颜色
      highlight: hilited_candidate_button_color
      vertical_inset: 4 # 垂直方向内缩量
      horizontal_inset: 0 # 水平方向内缩量
    # 前景内容设置
    foreground:
      font_size: 18 # 按钮字体大小
      style: "ic@apps" # \u 必须有，且u必须为小写。
      # fg_highlight:        # 高亮状态前景色
      normal: text
      # highlight:           # 高亮状态前景色
      padding: 2 # 前景内容与背景边界的内边距
      # size: [120, 24]      # 视图控件宽高，非前景样式宽高
    # 按钮点击事件
    action: menu_keyboard

  settings_button: &settings_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@cogs"
      normal: text
    action: Keyboard_settings

  floating_button: &floating_button
    foreground:
      font_size: 18
      padding: 2
      option_styles: ["ic@dock_window", "ic@keyboard_outline"]
      normal: text
    action: floating_keyboard_switch

  undo_button: &undo_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@rotate_left"
      normal: text
    action: undo

  redo_button: &redo_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@rotate_right"
      normal: text
    action: redo

  edit_button: &edit_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@cursor_move"
      normal: text
    action: Keyboard_edit

  voice_assist_button: &voice_switch_button
    foreground:
      font_size: 18
      padding: 2
      option_styles: ["ic@microphone", "ic@stop_circle"]
      normal: text
    action: voice_switch

  hide_button: &hide_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@keyboard_close"
      normal: text
    action: Hide

  clipboard_button: &clipboard_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@clipboard_list_outline"
      normal: text
    action: Clipboard_window

  history_button: &history_button
    foreground:
      font_size: 18
      padding: 2
      style: "ic@sticker_emoji"
      normal: text
    action: liquid_keyboard_history

  # 右侧按钮列表（从右向左排列）
  buttons: [*hide_button, *voice_switch_button, *history_button, *clipboard_button, *edit_button, *redo_button, *undo_button, *floating_button, *settings_button]

# 主布局  # 键盘布局
global_offset:
  key_symbol_offset_x: 0
  key_symbol_offset_y: 3
  key_text_offset_y: 0
  key_hint_offset_y: -3
  key_press_offset_y: 2
uphelp_offset:
  key_text_offset_x: -11
  key_text_offset_y: -16
  key_hint_offset_y: -13
  key_symbol_offset_x: 5
preset_keyboards:
  __include: "NekoCatppuccinlssp3x5a.yaml:/preset_keyboards" # 李氏三拼键盘 3x5a 布局

  default:
    __include: global_offset
    lock: false
    ascii_mode: 0
    label_transform: none # 中文时字母大写显示：uppercase 小写：none
    rows:
      - height: 0.13
        keys:
          - { click: "1", label_symbol: "!", swipe_up: "!", __include: "key_style/sj" }
          - { click: "2", label_symbol: "@", swipe_up: "@", __include: "key_style/sj" }
          - { click: "3", label_symbol: "#", swipe_up: "#", __include: "key_style/sj" }
          - { click: "4", label_symbol: "$", swipe_up: "$", __include: "key_style/sj" }
          - { click: "5", label_symbol: "%", swipe_up: "%", __include: "key_style/sj" }
          - { click: "6", label_symbol: "^", swipe_up: "^", __include: "key_style/sj" }
          - { click: "7", label_symbol: "&", swipe_up: "&", __include: "key_style/sj" }
          - { click: "8", label_symbol: "*", swipe_up: "*", __include: "key_style/sj" }
          - { click: "9", label_symbol: "(", swipe_up: "(", __include: "key_style/sj" }
          - { click: "0", label_symbol: ")", swipe_up: ")", __include: "key_style/sj" }
      - keys:
          - { click: "q", label_symbol: "`", swipe_up: "`", popup: ["Q"] }
          - { click: "w", label_symbol: "~", swipe_up: "~", popup: ["W"] }
          - { click: "e", label_symbol: "+", swipe_up: "+", popup: ["E"] }
